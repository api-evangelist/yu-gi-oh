      port: 9090
    - type: consumes
      namespace: ygoprodeck-database
      port:
    - type: rest
      namespace: ygoprodeck-database-rest
      port: 8080
    - type: mcp
      namespace: ygoprodeck-database-mcp
      port: 9090
    - type: consumes
      namespace: ygoprodeck-reference-data
      port:
    - type: rest
      namespace: ygoprodeck-reference-data-rest
