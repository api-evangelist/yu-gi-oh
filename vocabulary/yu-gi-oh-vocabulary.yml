      port: 8080
    - type: mcp
      namespace: ygoprodeck-archetypes-mcp
      port: 9090
    - type: consumes
      namespace: ygoprodeck-card-sets
      port:
    - type: rest
      namespace: ygoprodeck-card-sets-rest
      port: 8080
    - type: mcp
      namespace: ygoprodeck-card-sets-mcp
      port: 9090
