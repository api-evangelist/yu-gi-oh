aid: yu-gi-oh
name: YGOPRODeck
description: >-
  YGOPRODeck is a community-run Yu-Gi-Oh! TCG database and deck-sharing platform that exposes
  a free, public REST API (v7) for querying every Yu-Gi-Oh! card, archetype, card set, banlist
  status, format legality, market price, and card image. The API is the canonical open data
  source used by community deck builders, mobile apps, Discord bots, simulators, and analytics
  tools across the Yu-Gi-Oh! ecosystem.
