apis:
  - name: YGOPRODeck Card Database API
    description: >-
      The v7 REST API for the YGOPRODeck Yu-Gi-Oh! card database. Provides card search and
      filtering across every printed Yu-Gi-Oh! card, full card metadata (type, race, attribute,
      level, link, link markers, ATK/DEF, archetype, banlist, format legality), card sets and
      release info, archetypes, valid value enumerations, database version, and a random card
      endpoint. Free, no API key required, 20 requests per second per IP.
