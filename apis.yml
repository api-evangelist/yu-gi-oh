features:
  - name: Card Search
    description: >-
      Query the full Yu-Gi-Oh! card database with rich filters — exact name, fuzzy name, passcode
      ID, type, race, attribute, level/rank, link rating, link markers, ATK/DEF (with lt/lte/gt/gte
      comparison operators), pendulum scale, archetype, card set, format legality, banlist status,
      and effect-presence flag.
  - name: Multilingual Card Data
    description: >-
      Retrieve card text in English (default), French, German, Italian, and Portuguese using the
      `language` parameter on the cardinfo endpoint.
  - name: Format and Banlist Filtering
    description: >-
      Filter the catalog by tournament format (TCG, OCG, Goat, OCG Goat, Speed Duel, Master Duel,
      Rush Duel, Duel Links, GenesYS) and banlist status to power deck builders, legality checkers,
      and tournament tools.
  - name: Card Set and Print Run Catalog
    description: >-
      Enumerate every Yu-Gi-Oh! card set (1,000+) with TCG release dates, card counts, set images,
      and per-print pricing and rarity data via cardsets.php and cardsetsinfo.php.
  - name: Archetype Catalog
    description: >-
      List every recognised Yu-Gi-Oh! archetype (600+) to power archetype-based filtering, deck
      categorisation, and search-as-you-type experiences.
  - name: Market Price Aggregation
    description: >-
      Each card response includes prices from Cardmarket, TCGplayer, eBay, Amazon, and CoolStuffInc
      to power price tracking and arbitrage tools.
  - name: Card Image CDN
    description: >-
      Full-resolution, small, and cropped card images are served from images.ygoprodeck.com. Direct
      hotlinking is prohibited; consumers must download and self-host images.
  - name: Database Version Tracking
    description: >-
      The checkDBVer.php endpoint exposes the current database version and last update timestamp
      so that cached clients can invalidate efficiently.
  - name: Random Card Endpoint
    description: >-
      The randomcard.php endpoint returns a single random card and is uncached, suitable for
      "card of the day" widgets, Discord bots, and discovery features.
  - name: Open and Free Access
    description: >-
      No API key, no authentication, no quota beyond the documented 20 requests per second per IP.
      Funded by YGOPRODeck Premium subscriptions, ads, and donations rather than API metering.
useCases:
  - name: Deck Builder
    description: >-
      Web and mobile deck builders use cardinfo.php with archetype, format, and banlist filters
      to surface only the cards a player can legally include in a given tournament format.
  - name: Yu-Gi-Oh! Discord Bots
    description: >-
      Discord bots like the official YGOPRODeck bot use cardinfo.php and randomcard.php to look up
      cards, post random cards, and resolve archetype questions inside chat servers.
  - name: Price Tracker
    description: >-
      Apps that surface card prices use the per-card prices array to monitor Cardmarket/TCGplayer
      values, build watchlists, and detect arbitrage opportunities across marketplaces.
  - name: Tournament Legality Checker
    description: >-
      Tournament platforms (Master Duel, Duel Links, TCG, OCG) use the banlist and format filters
      to confirm deck legality before accepting a registration.
  - name: Card Image Pipeline
    description: >-
      Game simulators and printing tools download the full card image library once and rebuild
      their local card art catalog on each database version bump.
  - name: Card Recognition Training Data
    description: >-
      Computer vision pipelines for physical card recognition pull the entire image set as labelled
      training data, keyed by card id.
  - name: Meta and Format Analytics
    description: >-
      Meta analytics sites pull archetype and format data to build win-rate dashboards, archetype
      popularity charts, and ban-list impact studies.
integrations:
  - name: Cardmarket
    description: Per-card pricing in cardinfo responses sources Cardmarket marketplace prices.
  - name: TCGplayer
    description: Per-card pricing in cardinfo responses sources TCGplayer marketplace prices.
  - name: eBay
    description: Per-card pricing in cardinfo responses sources eBay listings.
  - name: Amazon
    description: Per-card pricing in cardinfo responses sources Amazon listings.
  - name: CoolStuffInc
    description: Per-card pricing in cardinfo responses sources CoolStuffInc marketplace prices.
  - name: Konami / 4K Media
    description: >-
      All card text and imagery is copyright Konami Digital Entertainment / 4K Media; YGOPRODeck
      surfaces and redistributes it under fair-use community-database conventions.
solutions:
  - name: Community Yu-Gi-Oh! Database
    description: >-
      A fully open, community-maintained replacement for proprietary Yu-Gi-Oh! card databases that
      lets developers build any tool — deck builder, simulator, scanner, bot — on top of the
      complete TCG corpus without contractual gates.
